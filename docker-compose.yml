version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: penny-reseller-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-penny_reseller}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - penny-reseller

  redis:
    image: redis:7-alpine
    container_name: penny-reseller-cache
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - penny-reseller

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: penny-reseller-api
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-penny_reseller}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key}
      WALMART_API_KEY: ${WALMART_API_KEY:-}
      LOWES_API_KEY: ${LOWES_API_KEY:-}
      HOME_DEPOT_API_KEY: ${HOME_DEPOT_API_KEY:-}
      AMAZON_SP_API_KEY: ${AMAZON_SP_API_KEY:-}
      EBAY_API_KEY: ${EBAY_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - penny-reseller

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: penny-reseller-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - penny-reseller

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  penny-reseller:
    driver: bridge
